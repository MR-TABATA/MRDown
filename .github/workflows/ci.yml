name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend type-check and build
        run: npm run build

      - name: Frontend tests
        run: npm test

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      # A stale notices file is a license violation, not a formatting nit —
      # fail the build rather than ship a binary whose attributions are wrong.
      - name: Third-party notices are up to date
        run: |
          npm run notice
          git diff --exit-code -- THIRD-PARTY-NOTICES.md \
            || { echo '::error::THIRD-PARTY-NOTICES.md is stale — run `npm run notice` and commit the result.'; exit 1; }
